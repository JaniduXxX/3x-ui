{{define "component/sidebar/content"}}
<template>
    <div class="ant-sidebar">
        <a-layout-sider :theme="themeSwitcher.currentTheme" collapsible :collapsed="collapsed"
            @collapse="(isCollapsed, type) => collapseHandle(isCollapsed, type)" breakpoint="md">
            <a-theme-switch></a-theme-switch>
            <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                @click="({key}) => openLink(key)">
                <a-menu-item v-for="tab in tabs" :key="tab.key">
                    <a-icon :type="tab.icon"></a-icon>
                    <span v-text="tab.title"></span>
                </a-menu-item>
            </a-menu>
        </a-layout-sider>
        <a-drawer placement="left" :closable="false" @close="closeDrawer" :visible="visible"
            :wrap-class-name="themeSwitcher.currentTheme" :wrap-style="{ padding: 0 }" :style="{ height: '100%' }">
            <div class="drawer-handle" @click="toggleDrawer" slot="handle">
                <a-icon :type="visible ? 'close' : 'menu-fold'"></a-icon>
            </div>
            <a-theme-switch></a-theme-switch>
            <a-menu :theme="themeSwitcher.currentTheme" mode="inline" :selected-keys="activeTab"
                @click="({key}) => openLink(key)">
                <a-menu-item v-for="tab in tabs" :key="tab.key">
                    <a-icon :type="tab.icon"></a-icon>
                    <span v-text="tab.title"></span>
                </a-menu-item>
            </a-menu>
        </a-drawer>
    </div>
</template>
{{end}}

{{define "component/aSidebar"}}
<style>
    /* ── Sidebar Enhanced Styles ── */
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap');

    .ant-sidebar > .ant-layout-sider {
        height: 100%;
        transition: all 0.3s cubic-bezier(0.2, 0, 0, 1) !important;
    }

    /* Dark sider glow border */
    .dark .ant-layout-sider {
        background: linear-gradient(180deg, #07101f 0%, #050811 100%) !important;
        border-right: 1px solid rgba(0, 245, 255, 0.1) !important;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.5) !important;
    }

    /* Light sider */
    .light .ant-layout-sider {
        background: linear-gradient(180deg, #f0f6ff 0%, #e8f0fe 100%) !important;
        border-right: 1px solid rgba(0, 100, 200, 0.1) !important;
        box-shadow: 4px 0 20px rgba(0, 0, 0, 0.06) !important;
    }

    /* Dark menu items */
    .dark .ant-menu-dark {
        background: transparent !important;
    }

    .dark .ant-menu-dark .ant-menu-item {
        margin: 4px 8px !important;
        border-radius: 10px !important;
        transition: all 0.25s ease !important;
        font-family: 'Outfit', sans-serif !important;
        font-weight: 500 !important;
        letter-spacing: 0.2px;
    }

    .dark .ant-menu-dark .ant-menu-item:hover {
        background: rgba(0, 245, 255, 0.08) !important;
        color: #00f5ff !important;
    }

    .dark .ant-menu-dark .ant-menu-item-selected {
        background: linear-gradient(90deg, rgba(0, 245, 255, 0.15), rgba(191, 95, 255, 0.1)) !important;
        border: 1px solid rgba(0, 245, 255, 0.2) !important;
        color: #00f5ff !important;
        box-shadow: 0 0 12px rgba(0, 245, 255, 0.1) !important;
    }

    .dark .ant-menu-dark .ant-menu-item-selected::after {
        border-right: none !important;
    }

    .dark .ant-menu-dark .ant-menu-item .anticon {
        transition: color 0.25s ease !important;
    }

    .dark .ant-menu-dark .ant-menu-item-selected .anticon {
        color: #00f5ff !important;
        filter: drop-shadow(0 0 4px rgba(0, 245, 255, 0.6)) !important;
    }

    /* Light menu */
    .light .ant-menu-light .ant-menu-item {
        margin: 4px 8px !important;
        border-radius: 10px !important;
        transition: all 0.25s ease !important;
        font-family: 'Outfit', sans-serif !important;
        font-weight: 500 !important;
    }

    .light .ant-menu-light .ant-menu-item:hover {
        background: rgba(0, 100, 200, 0.06) !important;
        color: #1890ff !important;
    }

    .light .ant-menu-light .ant-menu-item-selected {
        background: linear-gradient(90deg, rgba(24, 144, 255, 0.12), rgba(114, 46, 209, 0.06)) !important;
        border: 1px solid rgba(24, 144, 255, 0.2) !important;
        color: #1890ff !important;
    }

    .light .ant-menu-light .ant-menu-item-selected::after {
        border-right: none !important;
    }

    /* Sider trigger */
    .dark .ant-layout-sider-trigger {
        background: rgba(0, 245, 255, 0.06) !important;
        border-top: 1px solid rgba(0, 245, 255, 0.08) !important;
        transition: background 0.25s !important;
    }

    .dark .ant-layout-sider-trigger:hover {
        background: rgba(0, 245, 255, 0.12) !important;
        color: #00f5ff !important;
    }

    .light .ant-layout-sider-trigger {
        background: rgba(24, 144, 255, 0.05) !important;
        border-top: 1px solid rgba(24, 144, 255, 0.1) !important;
    }

    /* Drawer handle */
    .dark .drawer-handle {
        background: linear-gradient(135deg, #0a0f1e, #07101f) !important;
        border: 1px solid rgba(0, 245, 255, 0.15) !important;
        box-shadow: 2px 0 12px rgba(0, 0, 0, 0.4) !important;
        color: #00f5ff !important;
    }

    /* Collapsed logo area */
    .dark .ant-layout-sider-collapsed .ant-menu-item {
        padding: 0 !important;
        display: flex !important;
        justify-content: center !important;
    }
</style>

<script>
    const SIDEBAR_COLLAPSED_KEY = "isSidebarCollapsed"

    Vue.component('a-sidebar', {
        data() {
            return {
                tabs: [
                    {
                        key: '{{ .base_path }}panel/',
                        icon: 'dashboard',
                        title: '{{ i18n "menu.dashboard"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/inbounds',
                        icon: 'user',
                        title: '{{ i18n "menu.inbounds"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/settings',
                        icon: 'setting',
                        title: '{{ i18n "menu.settings"}}'
                    },
                    {
                        key: '{{ .base_path }}panel/xray',
                        icon: 'tool',
                        title: '{{ i18n "menu.xray"}}'
                    },
                    {
                        key: '{{ .base_path }}logout/',
                        icon: 'logout',
                        title: '{{ i18n "menu.logout"}}'
                    },
                ],
                activeTab: [
                    '{{ .request_uri }}'
                ],
                visible: false,
                collapsed: JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY)),
            }
        },
        methods: {
            openLink(key) {
                return key.startsWith('http') ?
                    window.open(key) :
                    location.href = key
            },
            closeDrawer() {
                this.visible = false;
            },
            toggleDrawer() {
                this.visible = !this.visible;
            },
            collapseHandle(collapsed, type) {
                if (type === "clickTrigger") {
                    localStorage.setItem(SIDEBAR_COLLAPSED_KEY, collapsed);
                    this.collapsed = JSON.parse(localStorage.getItem(SIDEBAR_COLLAPSED_KEY));
                }
            }
        },
        template: `{{template "component/sidebar/content"}}`,
    });
</script>
{{end}}
